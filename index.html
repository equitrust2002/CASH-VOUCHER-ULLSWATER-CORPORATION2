<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ullswater Pro | Enterprise Voucher System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --primary: #1a1a1a; --cash-accent: #008f39; --check-accent: #0056b3; --current: #008f39; }
        body { font-family: -apple-system, 'Inter', sans-serif; background: #dfe4ea; padding: 10px; margin: 0; -webkit-print-color-adjust: exact; }
        
        .container { 
            width: 98%; max-width: 210mm; background: white; margin: 10px auto; padding: 35px; 
            box-sizing: border-box; border: 4px solid var(--primary); position: relative; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .header { display: flex; justify-content: space-between; border-bottom: 5px solid var(--primary); padding-bottom: 10px; margin-bottom: 20px; }
        .brand h1 { margin: 0; font-size: 26px; font-weight: 900; text-transform: uppercase; letter-spacing: -1px; }
        .cv-title { font-size: 22px; font-weight: 900; color: var(--current); margin: 0; text-transform: uppercase; }
        #vID { font-weight: 900; background: #000; color: #fff; padding: 6px 15px; font-size: 18px; display: inline-block; border-radius: 2px; margin-top: 5px; cursor: pointer; }

        .form-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 20px; }
        @media (min-width: 650px) { .form-grid { grid-template-columns: 1.5fr 1fr; gap: 20px; } }

        .row { border-bottom: 1px solid #000; padding: 8px 0; display: flex; align-items: center; min-height: 35px; }
        .label { font-size: 10px; font-weight: 900; text-transform: uppercase; width: 110px; color: #555; flex-shrink: 0; }
        
        input, textarea { border: none; outline: none; font-size: 15px; width: 100%; background: transparent; text-transform: uppercase; font-weight: 700; font-family: inherit; color: #000; }
        
        /* iPhone Print Fix: Static Mirroring */
        .print-mirror { display: none; font-size: 15px; font-weight: 700; text-transform: uppercase; width: 100%; color: #000; white-space: pre-wrap; }

        table { width: 100%; border-collapse: collapse; margin: 20px 0; border: 2px solid #000; }
        th { background: var(--primary); color: white; padding: 10px; font-size: 11px; text-align: left; text-transform: uppercase; }
        td { border: 1px solid #000; padding: 12px; vertical-align: top; }

        .amount-section { border: 4px solid var(--current); margin-top: 15px; }
        .words-box { padding: 12px; background: #f8f9fa; font-size: 12px; font-weight: 800; text-transform: uppercase; border-bottom: 1px solid #eee; }
        .num-box { padding: 15px; background: #fff; font-size: 34px; font-weight: 900; color: var(--current); text-align: center; }

        .signature-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-top: 50px; }
        .sig-block { border-top: 2px solid #000; padding-top: 8px; text-align: center; font-size: 10px; font-weight: 900; text-transform: uppercase; }
        
        .footer-note { margin-top: 30px; border-top: 2px solid #000; padding-top: 15px; display: flex; justify-content: space-between; align-items: center; font-size: 9px; font-weight: 700; }
        #qrcode { background: #fff; padding: 5px; border: 1px solid #000; }

        /* Toolbar Controls */
        .toolbar { position: sticky; top: 0; background: #dfe4ea; padding: 10px; display: flex; flex-wrap: wrap; gap: 6px; z-index: 1000; justify-content: center; border-bottom: 1px solid #bbb; }
        .btn { padding: 10px 16px; border: none; color: #fff; font-weight: 900; font-size: 10px; cursor: pointer; border-radius: 4px; text-transform: uppercase; transition: 0.2s; }
        .btn-print { background: var(--current); border: 1px solid #fff; }
        .btn-util { background: #2d3436; }
        .btn-bulk { background: #6c5ce7; }
        .btn-reset { background: #d63031; }
        .btn-nav { background: #636e72; padding: 5px 10px; }

        @media print { 
            .no-print { display: none !important; } 
            body { background: white; padding: 0; }
            .container { width: 100%; margin: 0; border: 3px solid #000; box-shadow: none; padding: 20px; }
            input, textarea { display: none !important; } 
            .print-mirror { display: block !important; } 
        }
    </style>
</head>
<body>

<nav class="toolbar no-print">
    <button class="btn btn-print" onclick="executePrint()">PRINT PDF & NEXT</button>
    <button class="btn btn-util" onclick="saveCSV()">SAVE CSV</button>
    <button class="btn btn-util" onclick="saveJSON()">SAVE JSON</button>
    <button class="btn btn-bulk" onclick="document.getElementById('bulkLoad').click()">BULK LOAD JSON</button>
    
    <div style="display: flex; gap: 4px; align-items: center; background: #fff; padding: 2px 8px; border-radius: 4px; border: 1px solid #ccc;">
        <button class="btn btn-nav" onclick="navBulk(-1)">◀</button>
        <span id="bulkLabel" style="font-size:10px; font-weight:900; min-width:35px; text-align:center; color:#333;">0/0</span>
        <button class="btn btn-nav" onclick="navBulk(1)">▶</button>
    </div>

    <button class="btn btn-reset" onclick="fullClear()">CLEAR</button>
    
    <select id="vMode" onchange="toggleMode()" style="padding:8px; font-weight:900; border:2px solid #000; border-radius:4px;">
        <option value="CASH">CASH MODE</option>
        <option value="CHECK">CHECK MODE</option>
    </select>
    
    <input type="file" id="bulkLoad" style="display:none" accept=".json" multiple onchange="handleBulk(event)">
</nav>

<div class="container" id="voucher">
    <header class="header">
        <div class="brand">
            <h1 id="coName" contenteditable="true" onblur="saveState()">ULLSWATER CORPORATION</h1>
            <p style="margin:0; font-size:10px; font-weight:700; color:#444;">FINANCE UNIT | PROJECT OPERATIONS</p>
        </div>
        <div class="cv-meta" style="text-align:right">
            <p class="cv-title" id="typeTitle">CASH VOUCHER</p>
            <div id="vID" onclick="manualID()" title="Adjust ID">CV-2026-0001</div>
        </div>
    </header>

    <div class="form-grid">
        <div class="left">
            <div class="row">
                <span class="label">Pay To:</span>
                <input type="text" id="payee" placeholder="ENTER RECIPIENT" oninput="syncAll()">
                <div class="print-mirror" id="m_payee"></div>
            </div>
            <div class="row">
                <span class="label">Particulars:</span>
                <textarea id="particulars" rows="1" placeholder="EXPLANATION" oninput="syncAll()"></textarea>
                <div class="print-mirror" id="m_particulars"></div>
            </div>
        </div>
        <div class="right">
            <div class="row">
                <span class="label">Date:</span>
                <input type="date" id="vDate" oninput="syncAll()">
                <div class="print-mirror" id="m_date"></div>
            </div>
            <div class="row">
                <span class="label" id="refLabel">Ref No:</span>
                <input type="text" id="ref" placeholder="0000" oninput="syncAll()">
                <div class="print-mirror" id="m_ref"></div>
            </div>
        </div>
    </div>

    <table>
        <thead><tr><th width="70%">Account Category / Description</th><th width="30%">Amount</th></tr></thead>
        <tbody>
            <tr>
                <td>
                    <textarea id="account" rows="2" placeholder="ACCOUNTING ENTRY" oninput="syncAll()"></textarea>
                    <div class="print-mirror" id="m_account"></div>
                </td>
                <td>
                    <input type="number" id="amount" style="text-align:right; font-size:24px;" oninput="runMath()">
                    <div class="print-mirror" id="m_amount" style="text-align:right; font-size:24px;"></div>
                </td>
            </tr>
        </tbody>
    </table>

    <div class="amount-section">
        <div class="words-box" id="amtWords">ZERO PESOS ONLY</div>
        <div class="num-box" id="dispAmt">₱ 0.00</div>
    </div>

    <div class="signature-grid">
        <div class="sig-block">Prepared By</div>
        <div class="sig-block">Approved By</div>
        <div class="sig-block">Received By (Signature)</div>
    </div>

    <div class="footer-note">
        <div>ULLSWATER ENTERPRISE RECORD • DATA MIRRORED IN SECURE QR • 2026</div>
        <div id="qrcode"></div>
    </div>
</div>

<script>
    let bulkQueue = [];
    let bulkIdx = -1;

    // --- IPHONE FIX: SYNC MIRRORS ---
    function syncAll() {
        const fields = ['payee', 'particulars', 'ref', 'account', 'amount', 'vDate'];
        fields.forEach(f => {
            const val = document.getElementById(f).value;
            const mirror = document.getElementById('m_' + f.replace('vDate', 'date'));
            if(mirror) mirror.innerText = val.toUpperCase();
        });
        updateQR();
    }

    function executePrint() {
        syncAll(); // Final sync for iPhone
        let seq = parseInt(localStorage.getItem('ull_seq') || 1);
        localStorage.setItem('ull_seq', seq + 1);
        window.print();
        setTimeout(() => { location.reload(); }, 800);
    }

    // --- SYSTEM CORE ---
    function initID() {
        let n = localStorage.getItem('ull_seq') || 1;
        document.getElementById('vID').innerText = "CV-2026-" + n.toString().padStart(4, '0');
        syncAll();
    }

    function manualID() {
        let val = prompt("Set next ID number:", "1");
        if(val && !isNaN(val)) { localStorage.setItem('ull_seq', parseInt(val)); initID(); }
    }

    function fullClear() {
        if(confirm("Wipe all fields and reset counter?")) { localStorage.clear(); location.reload(); }
    }

    // --- MATH & WORDS ---
    function runMath() {
        let v = parseFloat(document.getElementById('amount').value) || 0;
        document.getElementById('dispAmt').innerText = "₱ " + v.toLocaleString(undefined, {minimumFractionDigits: 2});
        document.getElementById('amtWords').innerText = numberToWords(v);
        syncAll();
    }

    function numberToWords(num) {
        if (num === 0) return "ZERO PESOS ONLY";
        const a = ['', 'one ', 'two ', 'three ', 'four ', 'five ', 'six ', 'seven ', 'eight ', 'nine ', 'ten ', 'eleven ', 'twelve ', 'thirteen ', 'fourteen ', 'fifteen ', 'sixteen ', 'seventeen ', 'eighteen ', 'nineteen '];
        const b = ['', '', 'twenty ', 'thirty ', 'forty ', 'fifty ', 'sixty ', 'seventy ', 'eighty ', 'ninety '];
        const g = (n) => {
            let s = '';
            if (n >= 100) { s += a[Math.floor(n / 100)] + 'hundred '; n %= 100; }
            if (n >= 20) { s += b[Math.floor(n / 10)] + a[n % 10]; } else { s += a[n]; }
            return s;
        };
        let r = '', w = Math.floor(num), c = Math.round((num - w) * 100);
        if (w >= 1e6) { r += g(Math.floor(w / 1e6)) + 'million '; w %= 1e6; }
        if (w >= 1e3) { r += g(Math.floor(w / 1e3)) + 'thousand '; w %= 1e3; }
        r += g(w);
        return (r.trim() + (c > 0 ? " and " + c + "/100" : "") + " pesos only").toUpperCase();
    }

    // --- DATA HANDLING ---
    function saveJSON() {
        const d = { id: document.getElementById('vID').innerText, payee: document.getElementById('payee').value, date: document.getElementById('vDate').value, amt: document.getElementById('amount').value, ref: document.getElementById('ref').value, account: document.getElementById('account').value, part: document.getElementById('particulars').value };
        const blob = new Blob([JSON.stringify(d, null, 2)], {type: 'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download=`${d.id}.json`; a.click();
    }

    function saveCSV() {
        const header = "ID,PAYEE,DATE,AMOUNT,REF,ACCOUNT,PARTICULARS\n";
        const row = `"${document.getElementById('vID').innerText}","${document.getElementById('payee').value}","${document.getElementById('vDate').value}","${document.getElementById('amount').value}","${document.getElementById('ref').value}","${document.getElementById('account').value}","${document.getElementById('particulars').value}"`;
        const blob = new Blob([header + row], {type: 'text/csv'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download="export.csv"; a.click();
    }

    async function handleBulk(e) {
        const files = Array.from(e.target.files);
        bulkQueue = [];
        for (let f of files) { try { const t = await f.text(); bulkQueue.push(JSON.parse(t)); } catch(err) {} }
        if(bulkQueue.length > 0) { bulkIdx = 0; applyBulk(); }
    }

    function applyBulk() {
        const d = bulkQueue[bulkIdx];
        document.getElementById('payee').value = d.payee || d.p || "";
        document.getElementById('vDate').value = d.date || d.d || "";
        document.getElementById('amount').value = d.amt || d.amount || 0;
        document.getElementById('ref').value = d.ref || d.r || "";
        document.getElementById('account').value = d.account || d.a || "";
        document.getElementById('particulars').value = d.particulars || d.part || d.desc || "";
        document.getElementById('bulkLabel').innerText = `${bulkIdx + 1}/${bulkQueue.length}`;
        runMath();
    }

    function navBulk(dir) {
        if(bulkQueue.length === 0) return;
        bulkIdx = (bulkIdx + dir + bulkQueue.length) % bulkQueue.length;
        applyBulk();
    }

    // --- UTILS ---
    function updateQR() {
        const str = `${document.getElementById('vID').innerText}|${document.getElementById('payee').value}|${document.getElementById('amount').value}`;
        const target = document.getElementById("qrcode");
        target.innerHTML = "";
        new QRCode(target, { text: str, width: 75, height: 75 });
    }

    function toggleMode() {
        const m = document.getElementById('vMode').value;
        document.getElementById('typeTitle').innerText = m + " VOUCHER";
        document.documentElement.style.setProperty('--current', m === 'CASH' ? 'var(--cash-accent)' : 'var(--check-accent)');
        document.getElementById('refLabel').innerText = m === 'CASH' ? 'Ref No:' : 'Check No:';
    }

    function saveState() {
        localStorage.setItem('ull_name', document.getElementById('coName').innerText);
    }

    window.onload = () => {
        document.getElementById('coName').innerText = localStorage.getItem('ull_name') || "ULLSWATER CORPORATION";
        document.getElementById('vDate').valueAsDate = new Date();
        initID();
    };
</script>
</body>
</html>
